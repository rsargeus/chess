<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prototype 2 — Onboarding / Login Screen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #160c04;
      color: #d4c0a0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #login-screen {
      position: fixed;
      inset: 0;
      background: url('../frontend/src/chess-hero.png') center/cover no-repeat;
      display: flex;
      flex-direction: column;
      z-index: 100;
    }
    #login-screen::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(10, 5, 0, 0.72);
      pointer-events: none;
    }

    .login-hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 32px 32px;
      text-align: center;
      gap: 28px;
      position: relative;
      z-index: 1;
    }
    .login-logo { font-size: 3.5rem; line-height: 1; }
    .login-hero h1 {
      font-family: 'Cinzel', serif;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      background: linear-gradient(135deg, #f0c97a 0%, #c8922a 50%, #e8b85a 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
      margin-bottom: 8px;
    }
    .login-hero p { font-size: 0.9rem; color: #c8a870; max-width: 280px; line-height: 1.7; }

    .login-features {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 300px;
    }
    .login-feature {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(10, 5, 0, 0.6);
      border: 1px solid #5c3610;
      border-radius: 6px;
      padding: 10px 14px;
    }
    .login-feature-icon { width: 28px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .login-feature-text { font-size: 0.82rem; color: #a08050; line-height: 1.5; text-align: left; }
    .login-feature-text strong {
      font-family: 'Cinzel', serif;
      color: #d4a84b;
      display: block;
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      margin-bottom: 2px;
    }
    .login-features-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #5c3610;
      font-size: 0.65rem;
      width: 100%;
      max-width: 300px;
    }
    .login-features-divider::before, .login-features-divider::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, #5c3610, transparent);
    }

    .login-bottom {
      padding: 24px 32px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      border-top: 1px solid rgba(92,54,16,0.4);
      position: relative;
      z-index: 1;
    }
    .login-bottom::before {
      content: '';
      position: absolute;
      top: 0; left: 20%; right: 20%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(200,146,42,0.4), transparent);
    }
    .login-bottom > p {
      font-family: 'Cinzel', serif;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      color: #c8a870;
      text-transform: uppercase;
    }
    .btn-login {
      width: 100%;
      max-width: 300px;
      padding: 12px 20px;
      border-radius: 6px;
      border: 1px solid #5c3610;
      font-family: 'Cinzel', serif;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: opacity 0.15s;
    }
    .btn-login:hover { opacity: 0.85; }
    .btn-google {
      background: #fff;
      color: #1a0e05;
      border-color: #fff;
      font-family: system-ui, sans-serif;
      font-size: 0.9rem;
    }
    .btn-email {
      background: linear-gradient(135deg, #2a1508 0%, #1e0e04 100%);
      border-color: #5c3610;
      color: #c8a870;
    }
    .login-divider {
      width: 100%;
      max-width: 300px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #5c3610;
      font-size: 0.75rem;
    }
    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, #5c3610, transparent);
    }
  </style>
</head>
<body>
  <div id="login-screen">
    <div class="login-hero">
      <div class="login-logo">♟</div>
      <div>
        <h1>Chess</h1>
        <p>Play against friends or the AI — anywhere, anytime.</p>
      </div>

      <div class="login-features-divider">features</div>

      <div class="login-features">
        <div class="login-feature">
          <div class="login-feature-icon">
            <svg width="24" height="24" viewBox="0 0 32 32" fill="none">
              <defs>
                <radialGradient id="ls-eg" cx="40%" cy="38%" r="65%">
                  <stop offset="0%" stop-color="#4a6878"/>
                  <stop offset="100%" stop-color="#263848"/>
                </radialGradient>
                <clipPath id="ls-ec"><circle cx="16" cy="16" r="15"/></clipPath>
              </defs>
              <circle cx="16" cy="16" r="15" fill="url(#ls-eg)"/>
              <g transform="rotate(-23.5,16,16)" clip-path="url(#ls-ec)">
                <path d="M5 10 C7 8 12 9 13 12 C14 15 11 18 10 20 C8 21 5 20 5 17 C4 14 4 12 5 10Z" fill="#4a5e48"/>
                <path d="M10 22 C12 21 14 23 13 27 C12 30 9 31 8 28 C7 25 8 23 10 22Z" fill="#4a5e48"/>
                <path d="M19 8 C22 7 25 9 24 13 C23 16 21 15 20 18 C19 21 20 25 18 27 C16 29 15 27 16 24 C17 21 16 18 18 14 C19 12 18 10 19 8Z" fill="#4a5e48"/>
                <ellipse cx="16" cy="3.5" rx="6" ry="2.5" fill="rgba(255,255,255,0.72)"/>
                <ellipse cx="16" cy="28.5" rx="4" ry="2" fill="rgba(255,255,255,0.5)"/>
                <ellipse cx="11" cy="10" rx="4" ry="3" fill="rgba(255,255,255,0.18)" transform="rotate(-25 11 10)"/>
              </g>
              <circle cx="16" cy="16" r="15" stroke="rgba(255,255,255,0.18)" stroke-width="0.5"/>
            </svg>
          </div>
          <div class="login-feature-text">
            <strong>Play Online</strong>
            Challenge a friend with a shareable link
          </div>
        </div>
        <div class="login-feature">
          <div class="login-feature-icon">
            <svg width="22" height="26" viewBox="0 0 32 38" fill="none">
              <defs>
                <linearGradient id="ls-hg" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
                  <stop offset="0%"   stop-color="#141e28"/>
                  <stop offset="30%"  stop-color="#283848"/>
                  <stop offset="55%"  stop-color="#1e2c3a"/>
                  <stop offset="80%"  stop-color="#283848"/>
                  <stop offset="100%" stop-color="#141e28"/>
                </linearGradient>
                <linearGradient id="ls-hgg" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
                  <stop offset="0%"   stop-color="#dea83a"/>
                  <stop offset="60%"  stop-color="#c8922a"/>
                  <stop offset="100%" stop-color="#9a6e18"/>
                </linearGradient>
              </defs>
              <path d="M6 14 C6 5 26 5 26 14" fill="#1a2430"/>
              <rect x="5" y="13" width="22" height="21" rx="2" fill="url(#ls-hg)"/>
              <path d="M5 29 L5 34 Q5 36 7 36 L25 36 Q27 36 27 34 L27 29 Z" fill="url(#ls-hg)"/>
              <rect x="7" y="14" width="2.5" height="18" rx="1.25" fill="rgba(255,255,255,0.07)"/>
              <rect x="5" y="12" width="22" height="3.5" fill="url(#ls-hgg)"/>
              <circle cx="8.5"  cy="13.8" r="1" fill="#f0d060"/>
              <circle cx="16"   cy="13.8" r="1" fill="#f0d060"/>
              <circle cx="23.5" cy="13.8" r="1" fill="#f0d060"/>
              <rect x="15" y="17" width="2" height="5.5" rx="1" fill="#c8922a"/>
              <rect x="11.5" y="18.5" width="9" height="1.8" rx="0.9" fill="#c8922a"/>
              <path d="M16 16 L17.2 17.5 L16 18.3 L14.8 17.5 Z" fill="#daa830"/>
              <circle cx="11" cy="19.4" r="1.3" fill="#c8922a"/>
              <circle cx="21" cy="19.4" r="1.3" fill="#c8922a"/>
              <path d="M16 22.5 L17 21.8 L16 23.5 L15 21.8 Z" fill="#c8922a"/>
              <rect x="5" y="24" width="22" height="2.5" fill="url(#ls-hgg)"/>
              <rect x="6" y="26.5" width="20" height="2.5" rx="0.8" fill="#060c12"/>
              <rect x="5" y="29" width="22" height="2.5" fill="url(#ls-hgg)"/>
              <rect x="15" y="24" width="2" height="7.5" fill="#daa830"/>
              <circle cx="8"  cy="30.3" r="0.9" fill="#f0d060"/>
              <circle cx="24" cy="30.3" r="0.9" fill="#f0d060"/>
            </svg>
          </div>
          <div class="login-feature-text">
            <strong>AI Opponent</strong>
            10 difficulty levels, Beginner to Grandmaster
          </div>
        </div>
        <div class="login-feature">
          <div class="login-feature-icon">📖</div>
          <div class="login-feature-text">
            <strong>Full Game History</strong>
            Every move saved, navigate and review
          </div>
        </div>
      </div>
    </div>

    <div class="login-bottom">
      <p>Sign in to start playing</p>
      <button class="btn-login btn-google">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/></svg>
        Continue with Google
      </button>
      <div class="login-divider">or</div>
      <button class="btn-login btn-email">Continue with Email</button>
    </div>
  </div>
</body>
</html>
